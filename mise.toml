min_version = "2026.6.6"

[tools]
deno = "2.8.3"
hk = "1.48.0"
usage = "3.5.0"
pkl = '0.31.1'

[deps.aube]
auto = true

[settings]
experimental = true

[task_config]
includes = ["tasks", "home/.config/mise/tasks"]

[hooks]
postinstall = ["hk install --mise", "mise deps install"]

[shell_alias]
mr = 'mise tasks run '
mi = 'mise install '

[env]
HK_MISE = "1"
HK_HIDE_WHEN_DONE = "true"
MISE_EXPERIMENTAL = "1"

_.path = ["{{config_root}}/node_modules/.bin"]
