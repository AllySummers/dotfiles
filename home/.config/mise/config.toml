
[settings]
experimental = true
dotfiles.root = "~/.dotfiles/home"
dotfiles.default_mode = "symlink"

[dotfiles]
"~/.miserc.toml"                         = { mode = "symlink" }
"~/.zshenv"                              = { mode = "symlink" }
"~/.zprofile"                            = { mode = "symlink" }
"~/.zshrc"                               = { mode = "symlink" }
"~/.gitconfig"                           = { mode = "symlink" }
"~/.Brewfile"                            = { mode = "symlink" }
"~/.config/zsh"                          = { mode = "symlink-each" }
"~/.config/sheldon/plugins.toml"         = { mode = "symlink" }
"~/.config/atuin/config.toml"            = { mode = "symlink" }
"~/.config/mise/config.toml"             = { mode = "symlink" }
"~/.config/mise/config.macos.toml"       = { mode = "symlink" }

[tools]
# shell / dotfiles
atuin = "latest"
sheldon = "latest"
usage = "latest"
# required for some completions
"pipx:argcomplete" = "latest"

# languages & runtimes
node = "24.16.0"
"aqua:npm/cli" = "11.16.0"
pnpm = "latest"
deno = "latest"
# bun = "latest"
python = "3.14.5"
pipx = "latest"
# rust = "latest"
# go = "latest"

# cli utilities
delta = "latest"
ripgrep = "latest"
bat = "latest"
fzf = "0.73.1"
hk = "latest"
fd = "latest"
aube = "latest"
jq = "latest"
yq = "latest"
fx = "latest"
qsv = "20.1.0"
ast-grep = "0.43.0"
hyperfine = "latest"
killport = "2.0.0"
watchexec = "latest"

# dev tools
gh = "latest"
"github:microsoft/apm" = "latest"
pitchfork = "latest"
# "npm:typescript" = "6.0.3"
# "npm:tsx" = "4.22.4"
"npm:@withgraphite/graphite-cli" = "latest"
jd = "latest"
# "github:git-town/git-town" = "latest"

[tasks.sync-completions]
quiet = true
file = "git::https://github.com/AllySummers/mise-sync-completions.git//src/sync-completions"
tools.deno = "latest"

[shell_alias]
mi = "mise install "
gtt = "git-town "

[hooks]
postinstall = ["mise run sync-completions --quiet"]

[tasks."ast-grep-mcp"]
tools."pipx:ast-grep/ast-grep-mcp" = "latest"
run = "ast-grep-server"

[tasks."agent-lsp-mcp"]
tools."github:blackwell-systems/agent-lsp" = "latest"
tools."npm:typescript-language-server" = "latest"
tools."npm:bash-language-server" = "latest"
tools."npm:yaml-language-server" = "latest"
tools."npm:vscode-langservers-extracted" = "latest"
tools."github:sqls-server/sqls" = "latest"
tools."npm:dockerfile-language-server-nodejs" = "latest"
run = "agent-lsp"

# ── Bootstrap: system packages (Linux) ───────────────────────────────────────
# brew/brew-cask packages live in config.macos.toml (loaded on macOS only).
[bootstrap.packages]
"apt:git" = "latest"
"apt:curl" = "latest"
"apt:zsh" = "latest"
"apt:build-essential" = "latest"
"apt:ca-certificates" = "latest"
"pacman:git" = "latest"
"pacman:curl" = "latest"
"pacman:zsh" = "latest"
"pacman:git-town" = "latest"
"pacman:base-devel" = "latest"
"pacman:ca-certificates" = "latest"
"dnf:git" = "latest"
"dnf:curl" = "latest"
"dnf:zsh" = "latest"
"dnf:make" = "latest"
"dnf:gcc" = "latest"
"dnf:ca-certificates" = "latest"

# ── Bootstrap: user ───────────────────────────────────────────────────────────
[bootstrap.user]
login_shell = "/bin/zsh"

# ── Bootstrap task ────────────────────────────────────────────────────────────
# Orchestrates post-bootstrap steps via depends. Each sub-task is also runnable
# independently (e.g. 'mise run bootstrap:gui' to reinstall GUI casks alone).
# sync-completions is NOT called here — the existing postinstall hook already
# runs it automatically when 'mise bootstrap' installs tools.
[tasks.bootstrap]
description = "Post-bootstrap machine setup"
depends = ["bootstrap:*"]

[tasks."bootstrap:atuin-hooks"]
description = "Install atuin agent hooks (claude-code, codex, pi)"
run = [
  'atuin hook install claude-code',
  'atuin hook install codex',
  'atuin hook install pi',
]
