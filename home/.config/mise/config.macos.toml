# "brew:gawk" = "latest"
# "brew:glow" = "latest"
# "brew:gnu-sed" = "latest"
# "brew:gnu-tar" = "latest"
# "brew:gnu-which" = "latest"
# "brew:gnupg" = "latest"
# "brew:gpatch" = "latest"
# "brew:grep" = "latest"
# "brew:gzip" = "latest"
# "brew:iperf3" = "latest"
# "brew:less" = "latest"
# "brew:make" = "latest"
# "brew:nano" = "latest"
# "brew:screen" = "latest"
# "brew:watch" = "latest"
