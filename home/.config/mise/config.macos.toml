# ── Bootstrap: macOS defaults ─────────────────────────────────────────────────
# Check drift with: mise bootstrap macos-defaults status

[bootstrap.macos.defaults.NSGlobalDomain]
# Save / print panels
NSNavPanelExpandedStateForSaveMode = true
NSNavPanelExpandedStateForSaveMode2 = true
PMPrintingExpandedStateForPrint = true
PMPrintingExpandedStateForPrint2 = true
# iCloud
NSDocumentSaveNewDocumentsToCloud = false
# App lifecycle
NSDisableAutomaticTermination = true
# Appearance
AppleInterfaceStyle = "Dark"
AppleShowAllExtensions = true
AppleShowScrollBars = "Always"
# Scrolling / navigation gestures
"com.apple.swipescrolldirection" = false
AppleEnableSwipeNavigateWithScrolls = false
# Keyboard
AppleKeyboardUIMode = 3
"com.apple.keyboard.fnState" = true
ApplePressAndHoldEnabled = false
KeyRepeat = 6
InitialKeyRepeat = 35
# Locale / language
# AppleLanguages is an array type — not supported in mise defaults; set via hook
AppleLocale = "en_US@rg=auzzzz"
AppleMeasurementUnits = "Centimeters"
AppleMetricUnits = true
AKLastLocale = "en_US@rg=auzzzz"
# Window / tab behaviour
AppleWindowTabbingMode = "always"
# Autocorrect / typing intelligence
NSAutomaticCapitalizationEnabled = false
NSAutomaticPeriodSubstitutionEnabled = 0
NSAutomaticDashSubstitutionEnabled = false
NSAutomaticQuoteSubstitutionEnabled = false
NSAutomaticSpellingCorrectionEnabled = false
NSAutomaticInlinePredictionEnabled = false
WebAutomaticSpellingCorrectionEnabled = false
# Spring loading
"com.apple.springing.enabled" = true
"com.apple.springing.delay" = 0.0
# Font rendering
AppleFontSmoothing = 1
# Trackpad force click (global pref)
"com.apple.trackpad.forceClick" = false

[bootstrap.macos.defaults."com.apple.dock"]
autohide = false
tilesize = 36.0
show-recents = false
minimize-to-application = true
show-process-indicators = true
enterMissionControlByTopWindowDrag = false
# Hot corner: bottom-right → Quick Note
wvous-br-corner = 14
wvous-br-modifier = 0

[bootstrap.macos.defaults."com.apple.finder"]
QuitMenuItem = true
ShowPathbar = true
ShowStatusBar = true
AppleShowAllFiles = true
ShowExternalHardDrivesOnDesktop = true
ShowMountedServersOnDesktop = true
ShowRemovableMediaOnDesktop = true
_FXShowPosixPathInTitle = true
_FXSortFoldersFirst = true
FXDefaultSearchScope = "SCcf"
FXEnableExtensionChangeWarning = false
FXPreferredViewStyle = "Nlsv"
WarnOnEmptyTrash = false
OpenWindowForNewRemovableDisk = true

[bootstrap.macos.defaults."com.apple.screencapture"]
type = "png"
location = "~/Pictures/macos screenshots"  # ~ not expanded by mise; status shows false "differs" but apply is correct
target = "file"
disable-shadow = true

[bootstrap.macos.defaults."com.apple.screensaver"]
askForPassword = 1
askForPasswordDelay = 0

[bootstrap.macos.defaults."com.apple.print.PrintingPrefs"]
"Quit When Finished" = true

[bootstrap.macos.defaults."com.apple.LaunchServices"]
LSQuarantine = false

[bootstrap.macos.defaults."com.apple.systempreferences"]
NSQuitAlwaysKeepsWindows = false

[bootstrap.macos.defaults."com.apple.helpviewer"]
DevMode = true

[bootstrap.macos.defaults."com.apple.SoftwareUpdate"]
AutomaticCheckEnabled = true
ScheduleFrequency = 1
AutomaticDownload = 1
CriticalUpdateInstall = 1
ConfigDataInstall = 1

[bootstrap.macos.defaults."com.apple.commerce"]
AutoUpdate = true
AutoUpdateRestartRequired = false

[bootstrap.macos.defaults."com.apple.appstore"]
WebKitDeveloperExtras = true
ShowDebugMenu = true

[bootstrap.macos.defaults."com.apple.BluetoothAudioAgent"]
"Apple Bitpool Min (editable)" = 40

[bootstrap.macos.defaults."com.apple.NetworkBrowser"]
BrowseAllInterfaces = true

[bootstrap.macos.defaults."com.apple.desktopservices"]
DSDontWriteNetworkStores = true
DSDontWriteUSBStores = true

[bootstrap.macos.defaults."com.apple.frameworks.diskimages"]
skip-verify = true
skip-verify-locked = true
skip-verify-remote = true
auto-open-ro-root = true
auto-open-rw-root = true

[bootstrap.macos.defaults."com.apple.Safari"]
IncludeDevelopMenu = true
WebKitDeveloperExtrasEnabledPreferenceKey = true
"WebKitPreferences.developerExtrasEnabled" = true
AutoOpenSafeDownloads = false

[bootstrap.macos.defaults."com.apple.terminal"]
SecureKeyboardEntry = true
ShowLineMarks = 0

[bootstrap.macos.defaults."com.apple.TimeMachine"]
DoNotOfferNewDisksForBackup = true

[bootstrap.macos.defaults."com.apple.ActivityMonitor"]
OpenMainWindow = true
IconType = 5
ShowCategory = 100
SortColumn = "CPUUsage"
SortDirection = 0

[bootstrap.macos.defaults."com.apple.AppleMultitouchTrackpad"]
Clicking = true
ForceSuppressed = true
ActuateDetents = 0
TrackpadPinch = 0
TrackpadRotate = 0
TrackpadTwoFingerDoubleTapGesture = 0

[bootstrap.macos.defaults."com.apple.driver.AppleBluetoothMultitouch.trackpad"]
Clicking = true
TrackpadPinch = 0
TrackpadRotate = 0
TrackpadTwoFingerDoubleTapGesture = 0

[bootstrap.macos.defaults."com.apple.WindowManager"]
EnableStandardClickToShowDesktop = false
StandardHideWidgets = 1
EnableTiledWindowMargins = false

[bootstrap.macos.defaults."com.apple.spaces"]
spans-displays = true

# ── Bootstrap: hooks ──────────────────────────────────────────────────────────
[bootstrap.hooks.post-defaults]
run = [
  # "mkdir -p \"$HOME/Pictures/macos screenshots\"",
  # "defaults write com.apple.screencapture location -string \"$HOME/Pictures/macos screenshots\"", # set by mise
  "defaults write NSGlobalDomain AppleLanguages -array 'en-US' 'en-AU'",
  "defaults -currentHost write com.apple.ImageCapture disableHotPlug -bool true",
  "chflags nohidden ~/Library && xattr -d com.apple.FinderInfo ~/Library 2>/dev/null || true",
  "/System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister -r -domain local -domain system -domain user",
  "killall Dock",
  "killall Finder",
  "killall SystemUIServer",
]

