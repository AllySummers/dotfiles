# Loaded by mise on macOS only (requires auto_env = true in config.toml).
# Merges with config.toml — brew/brew-cask packages are additive.

[dotfiles]
"~/Library/Application Support/Cursor/User/settings.json" = { source = "~/.dotfiles/home/.config/Cursor/User/settings.json.tmpl", mode = "template" }

# ── Bootstrap: macOS packages ─────────────────────────────────────────────────
# Moved to ~/.Brewfile — mise's brew-cask: backend counts .metadata as a version
# directory, causing spurious "multiple Caskroom versions found" warnings on every
# `mise install`. Managing via brew bundle avoids this until the bug is fixed.
# To re-enable, uncomment below and remove the entries from ~/.Brewfile.
[bootstrap.packages]
# # Homebrew formulae
# "brew:bash" = "latest"
# "brew:binutils" = "latest"
# "brew:calc" = "latest"
# "brew:coreutils" = "latest"
# "brew:diffutils" = "latest"
# "brew:ed" = "latest"
# "brew:findutils" = "latest"
