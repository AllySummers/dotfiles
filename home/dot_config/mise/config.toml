uv = "0.11.19"
rust = "1.96.0"
go = "1.26.4"

# cli utilities
delta = "0.19.2"
ripgrep = "15.1.0"
bat = "0.26.1"
fzf = "0.73.1"
hk = "1.46.0"
fd = "10.4.2"
aube = "1.18.0"
sd = "1.1.0"
jq = "1.8.1"
yq = "4.53.3"
fx = "39.2.0"
qsv = "20.1.0"
ast-grep = "0.43.0"
hyperfine = "1.20.0"
killport = "2.0.0"
watchexec = "2.5.1"

# dev tools
gh = "2.93.0"
# "github:microsoft/apm" = "0.16.0"
pitchfork = "2.12.1"
"npm:typescript" = "6.0.3"
"npm:tsx" = "4.22.4"
"npm:@withgraphite/graphite-cli" = "1.8.6"

# agent lsp stuff
